<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Escape Authoring – Hash Codes</title>
  <style>
    body{ font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin:20px; }
    textarea, pre{ width:100%; min-height:160px; }
    .row{ display:flex; gap:14px; flex-wrap:wrap; }
    .row > * { flex:1; min-width:280px; }
    button{ padding:8px 14px; }
    label{ display:block; margin:6px 0; font-weight:600; }
  </style>
</head>
<body>
  <h1>Escape Authoring – Hash Codes</h1>
  <p>Paste one code per line (e.g., <code>BRIDGE-42</code>, <code>APPLE</code>). Output will be JSON of <code>codeHashes</code> ready to paste into <code>index.html</code>.</p>
  <div class="row">
    <div>
      <label for="codes">Codes (one per step):</label>
      <textarea id="codes" placeholder="APPLE
BRIDGE-42
EEL-007"></textarea>
      <div style="margin-top:10px;">
        <button id="go">Generate Hashes</button>
      </div>
    </div>
    <div>
      <label>Output JSON:</label>
      <pre id="out"></pre>
    </div>
  </div>
  <script>
    const canonicalize = s => (s||"").toLowerCase().replace(/[\s\-_\.\:]/g,'').trim();
    async function sha256Hex(str) {
      const data = new TextEncoder().encode(canonicalize(str));
      const digest = await crypto.subtle.digest('SHA-256', data);
      const bytes = new Uint8Array(digest);
      return [...bytes].map(b => b.toString(16).padStart(2,'0')).join('');
    }
    document.getElementById('go').addEventListener('click', async ()=>{
      const lines = document.getElementById('codes').value.split('\n').map(s=>s.trim()).filter(Boolean);
      const arr = [];
      for(const [i, line] of lines.entries()){
        const h = await sha256Hex(line);
        arr.push({ title: `Step ${i+1}`, codeHashes: [h] });
      }
      document.getElementById('out').textContent = JSON.stringify(arr, null, 2);
    });
  </script>
</body>
</html>
